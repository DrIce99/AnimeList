<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="anime-count">0/0</div>

    <div class="sidebar">
      <div class="sidebar-content">
        <div class="sidebar-header">
          <h1>Le siummate del Disgraz</h1>
          <a href="">Home</a>
          <input type="text" id="searchName" placeholder="Inserisci nome...">
          <input type="text" id="searchCharre" placeholder="Inserisci il nome di un personaggio...">
          <h3 id="generatore">Filtra per generi</h3>
        </div>

        <div id="genreList"></div>
      </div>

      <div class="sidebar-footer">
        <a href="https://github.com/DrIce99" class="github-link">Githubbata tattica</a>
      </div>
    </div>

    <br /><br /><br />

    <!--<div class="container-title">Le siummate del Disgraz</div>-->
    <div id="anime-container"></div>

    <div class="action-menu-container">
      <div class="action-items">
        <button class="action-item" id="addAnime">Aggiungi anime</button>
        <button class="action-item" id="editAnime">Modifica anime</button>
        <button class="action-item" id="deleteAnime">Elimina anime</button>
      </div>
      <button class="main-action-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
        </svg>
      </button>
    </div>

    <!-- MODALE AGGIUNTA ANIME -->
    <div id="addModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Aggiungi Nuovo Anime</h2>
          <button class="close-modal" id="closeAdd">&times;</button>
        </div>
        <div class="container-card" style="border: 1px solid #8dfdff; padding: 20px; border-radius: 20px;">
          <input type="text" id="add-nome" class="edit-input" placeholder="Titolo Anime">
          <input type="text" id="add-originale" class="edit-input" placeholder="Titolo Originale">
          <label>URL Copertina:</label>
          <div class="image-input-group">
            <input type="text" id="add-img" class="edit-input" placeholder="Incolla URL qui...">
            <button id="btnSearchImg" class="save-btn" style="background: #8dfdff; color: #111;">Cerca</button>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <input type="text" id="add-anno" class="edit-input" placeholder="Anno Uscita">
            <input type="text" id="add-ep" class="edit-input" placeholder="N. Episodi">
          </div>
          <input type="text" id="add-studio" class="edit-input" placeholder="Studio di Animazione">
          <input type="text" id="add-rating" class="edit-input" placeholder="Rating (es. 8/10)">
          <label>Generi Selezionati:</label>
          <div id="selectedGenresContainer" class="genres-container"></div>
          <label>Seleziona Generi:</label>
          <div class="search-dropdown" id="availableGenresList" style="display: block; position: static; max-height: 150px;"></div>
          <p style="font-size: 12px; color: #8dfdff;">* I personaggi verranno inizializzati vuoti.</p>
        </div>
        <div class="modal-footer">
          <button id="confirmAdd" class="save-btn" style="background: #8dfdff;">Salva Anime</button>
        </div>
      </div>
    </div>

    <!-- MODALE MODIFICA ANIME -->
    <div id="editModal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        
        <!-- Header -->
        <div class="modal-header">
          <h2>Modifica Anime</h2>
          <button class="close-modal" id="closeEdit">&times;</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <!-- Form di modifica -->
        <div id="editFormContainer">
          <div class="container-card" style="border: 1px solid #ff5fcb; padding: 20px; border-radius: 20px;">
            
            <label>Titolo:</label>
            <input type="text" id="edit-nome" class="edit-input">
            
            <label>Titolo Originale:</label>
            <input type="text" id="edit-originale" class="edit-input">
            
            <label>URL Copertina:</label>
            <div class="image-input-group">
              <input type="text" id="edit-img" class="edit-input">
              <button id="btnSearchImgEdit" class="save-btn" style="background: #8dfdff; color: #111;">Cerca</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
              <div>
                <label>Anno:</label>
                <input type="text" id="edit-anno" class="edit-input">
              </div>
              <div>
                <label>Episodi:</label>
                <input type="text" id="edit-ep" class="edit-input">
              </div>
            </div>

            <label>Studio:</label>
            <input type="text" id="edit-studio" class="edit-input">

            <label>Rating:</label>
            <input type="text" id="edit-rating" class="edit-input">

            <!-- Generi -->
            <label>Generi Selezionati:</label>
            <div id="editSelectedGenresContainer" class="genres-container"></div>
            
            <label>Aggiungi/Rimuovi Generi:</label>
            <div class="search-dropdown" id="editAvailableGenresList" style="display: block; position: static; max-height: 120px;"></div>

          </div>

          <!-- Footer -->
          <div class="modal-footer">
            <button id="confirmUpdate" class="save-btn">Salva Modifiche Sium</button>
          </div>
        </div>
        
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
